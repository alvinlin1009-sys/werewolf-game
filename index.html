
  <!DOCTYPE html>
  <html lang="zh-TW">
  <head>
      <meta charset="UTF-8">
      <meta name="viewport" content="width=device-width, initial-scale=1.0">
      <title>文字版狼人殺 - 黑暗之夜</title>
      <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
      <style>
          :root {
              --bg-color: #1a1a1a;
              --card-bg: #2d2d2d;
              --text-color: #e0e0e0;
              --accent-red: #cf6679;
              --accent-blue: #03dac6;
              --accent-gold: #ffb300;
              --wolf-color: #8b0000;
          }

          body {
              background-color: var(--bg-color);
              color: var(--text-color);
              font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
              margin: 0;
              display: flex;
              justify-content: center;
              align-items: center;
              height: 100vh;
              overflow: hidden;
          }

          #game-container {
              width: 90%;
              max-width: 800px;
              height: 80vh;
              background: var(--card-bg);
              border-radius: 15px;
              box-shadow: 0 10px 30px rgba(0,0,0,0.5);
              display: flex;
              flex-direction: column;
              position: relative;
              border: 1px solid #444;
          }

          /* --- 登入界面 --- */
          #login-screen {
              display: flex;
              flex-direction: column;
              justify-content: center;
              align-items: center;
              height: 100%;
              gap: 20px;
          }

          input {
              padding: 12px;
              font-size: 1.2rem;
              border-radius: 8px;
              border: 1px solid #555;
              background: #3d3d3d;
              color: white;
              text-align: center;
          }

          button {
              padding: 12px 24px;
              font-size: 1.2rem;
              border-radius: 8px;
              border: none;
              background: var(--accent-blue);
              color: #1a1a1a;
              cursor: pointer;
              font-weight: bold;
              transition: 0.3s;
          }

          button:hover {
              filter: brightness(1.2);
              transform: scale(1.05);
          }

          #add-bot-btn {
              background: var(--accent-gold);
              color: #1a1a1a;
              display: none;
          }

          /* --- 遊戲主界面 --- */
          #main-game {
              display: none;
              flex-direction: column;
              height: 100%;
          }

          #status-bar {
              padding: 15px;
              background: #222;
              text-align: center;
              font-size: 1.4rem;
              font-weight: bold;
              border-bottom: 2px solid var(--accent-red);
              color: var(--accent-gold);
          }

          #game-log {
              flex: 1;
              overflow-y: auto;
              padding: 20px;
              display: flex;
              flex-direction: column;
              gap: 10px;
              background: rgba(0,0,0,0.2);
          }

          .log-entry {
              padding: 8px 12px;
              border-radius: 5px;
              animation: fadeIn 0.3s ease;
          }

          .log-system { color: var(--accent-gold); font-weight: bold; border-left: 4px solid var(--accent-gold); background: rgba(255,179,0,0.1); }
          .log-chat { color: var(--text-color); border-left: 4px solid #666; }
          .log-private { color: var(--accent-blue); font-style: italic; background: rgba(3,218,198,0.1); }
          .log-wolf { color: #ff4d4d; border-left: 4px solid #ff0000; background: rgba(255,0,0,0.1); }

          /* --- 控制區 --- */
          #control-panel {
              padding: 20px;
              background: #222;
              display: flex;
              gap: 10px;
              border-top: 1px solid #444;
          }

          #action-input {
              flex: 1;
              padding: 12px;
              font-size: 1rem;
              border-radius: 8px;
              border: 1px solid #555;
              background: #3d3d3d;
              color: white;
          }

          #action-input:disabled {
              background: #222;
              color: #666;
              cursor: not-allowed;
              border: 1px solid #333;
          }

          /* --- 身分標誌 --- */
          #role-badge {
              position: absolute;
              top: 20px;
              right: 20px;
              padding: 5px 15px;
              background: var(--wolf-color);
              color: white;
              border-radius: 20px;
              font-weight: bold;
              font-size: 0.9rem;
              display: none;
              box-shadow: 0 4px 10px rgba(0,0,0,0.3);
          }

          @keyframes fadeIn {
              from { opacity: 0; transform: translateY(10px); }
              to { opacity: 1; transform: translateY(0); }
          }

          .hidden { display: none !important; }
      </style>
  </head>
  <body>

      <div id="game-container">
          <!-- 登入界面 -->
          <div id="login-screen">
              <h1 style="color: var(--accent-red); font-size: 2.5rem;">🐺 狼人殺</h1>
              <input type="text" id="username" placeholder="輸入你的名字..." maxlength="10">
              <div style="display: flex; gap: 10px; margin-top: 10px; justify-content: center;">
                  <button id="create-btn">建立房間</button>
              </div>
              <div style="display: flex; gap: 10px; margin-top: 20px; justify-content: center; align-items: center;">
                  <input type="text" id="room-code" placeholder="房號..." maxlength="6" style="width: 100px;">
                  <button id="join-btn" style="background: var(--accent-gold);">加入房間</button>
              </div>
          </div>

          <!-- 遊戲主界面 -->
          <div id="main-game">
              <div id="role-badge">Role: Unknown</div>
              <div id="status-bar">等待玩家加入...</div>
              <div id="game-log"></div>
              <div id="control-panel">
                  <input type="text" id="action-input" placeholder="等待指令..." disabled>
                  <button id="send-btn">發送</button>

                  <button id="end-speech-btn" style="display: none; background: var(--accent-red); color: white;">結束發言</button>
                  <button id="add-bot-btn">加人機</button>
              </div>
          </div>
      </div>

      <script>
          // ==========================================
          // 設定後端網址 (如果是部署到 Cloud Run，請修改此處)
          // ==========================================
          const SERVER_URL = window.location.origin;
          const socket = io(SERVER_URL);

          const loginScreen = document.getElementById('login-screen');
          const mainGame = document.getElementById('main-game');
          const usernameInput = document.getElementById('username');
          const createBtn = document.getElementById('create-btn');
          const joinBtn = document.getElementById('join-btn');
          const roomCodeInput = document.getElementById('room-code');
          const statusBar = document.getElementById('status-bar');
          const gameLog = document.getElementById('game-log');
          const actionInput = document.getElementById('action-input');
          const sendBtn = document.getElementById('send-btn');
          const addBotBtn = document.getElementById('add-bot-btn');
          const roleSelector = document.getElementById('role-selector');
          const roleBadge = document.getElementById('role-badge');
          const endSpeechBtn = document.getElementById('end-speech-btn');

          let myName = "";
          let myRole = "";

          // --- 登入邏輯 ---
          createBtn.onclick = () => {
              myName = usernameInput.value.trim();
              if (!myName) return alert("請輸入名字！");
              socket.emit('create_room', myName);
          };

          joinBtn.onclick = () => {
              myName = usernameInput.value.trim();
              const roomId = roomCodeInput.value.trim().toUpperCase();
              if (!myName) return alert("請輸入名字！");
              if (!roomId) return alert("請輸入房號！");
              socket.emit('join_room', { name: myName, roomId });
          };

          // --- 發送邏輯 ---
          const handleSend = () => {
              const val = actionInput.value.trim();
              if (!val) return;

              // 判斷是聊天訊息還是遊戲指令
              const commandMatch = val.match(/^(kill|check|vote|shoot|save|poison)(?:\s+(.*))?$/i);

              if (commandMatch) {
                  socket.emit('game_action', {
                      cmd: commandMatch[1].toLowerCase(),
                      target: commandMatch[2]
                  });
                  actionInput.value = "";
                  actionInput.disabled = true;
                  actionInput.placeholder = "已送出指令，等待中...";
              } else {
                  socket.emit('chat_message', val);
              }
              actionInput.value = "";
          };

          sendBtn.onclick = handleSend;
          actionInput.onkeypress = (e) => { if (e.key === 'Enter') handleSend(); };

          addBotBtn.onclick = () => {
              socket.emit('add_bot');
          };

          endSpeechBtn.onclick = () => {
              socket.emit('end_speech');
          };



          // ==========================================
          // Socket 事件監聽
          // ==========================================

          socket.on('game_update', ({ message, state }) => {
              loginScreen.classList.add('hidden');
              mainGame.style.display = 'flex';
              updateUI(message, state);
          });

          socket.on('private_msg', (data) => {
              if (data.type === 'ROLE_ASSIGN') {
                  myRole = data.role;
                  roleBadge.innerText = `身分: ${data.role}`;
                  roleBadge.style.display = 'block';
                  addLog(`[系統] 你的身分是：${data.role}`, 'log-private');
              } else if (data.type === 'WITCH_PROMPT') {
                  addLog(`[女巫提示] ${data.msg}`, 'log-private');
                  actionInput.disabled = false;
                  actionInput.placeholder = "輸入指令 (例如: save 1 或 poison 3)";
              } else if (data.type === 'SHOOT_PROMPT') {
                  addLog(`[獵人提示] 選擇要射擊的玩家號碼！`, 'log-private');
                  actionInput.disabled = false;
                  actionInput.placeholder = "輸入 shoot [號碼]";
              } else if (data.type === 'SPEECH_UNLOCK') {
                  actionInput.disabled = false;
                  actionInput.placeholder = "現在輪到你發言了...";
              } else if (data.type === 'LAST_WORDS_UNLOCK') {
                  actionInput.disabled = false;
                  actionInput.placeholder = "現在輪到你發表遺言了...";
              } else {
                  addLog(`[私訊] ${data.msg || data}`, 'log-private');
              }
          });

          let countdownInterval = null;

          // --- UI 更新邏輯 ---
          function updateUI(message, state) {
              if (message) {
                  const type = message.includes('[WOLF]') ? 'log-wolf' :
                               (message.includes('[🗣️ 發言]') || message.includes('[👻 遺言]') ? 'log-chat' : 'log-system');
                  addLog(message, type);
              }

              if (state.status === 'WAITING' && state.players.length < 9 && socket.id === state.hostId) {
                  addBotBtn.style.display = 'block';
              } else {
                  addBotBtn.style.display = 'none';
              }

              let mySeat = null;
              if (state && state.players) {
                  const me = state.players.find(p => p.name === myName);
                  if (me) mySeat = me.seat;
              }

              if ((state.status === 'DAY_SPEECH' || state.status === 'DAY_LAST_WORDS') && state.currentSpeaker === mySeat) {
                  endSpeechBtn.style.display = 'block';
              } else {
                  endSpeechBtn.style.display = 'none';
              }

              if (countdownInterval) {
                  clearInterval(countdownInterval);
                  countdownInterval = null;
              }

              // 根據狀態控制輸入框
              switch (state.status) {
                  case 'WAITING':
                      statusBar.innerText = `房間：${state.roomId} | 等待玩家... (${state.players.length}/9)`;
                      actionInput.disabled = true;
                      break;
                  case 'NIGHT_WOLF':
                      statusBar.innerText = "🌙 黑夜：狼人請睜眼";
                      actionInput.disabled = (myRole !== 'WEREWOLF');
                      if (myRole === 'WEREWOLF') actionInput.placeholder = "聊天，或輸入 kill [號碼] 投票殺人";
                      break;
                  case 'NIGHT_SEER':
                      statusBar.innerText = "🌙 黑夜：預言家請睜眼";
                      actionInput.disabled = (myRole !== 'SEER');
                      if (myRole === 'SEER') actionInput.placeholder = "輸入 check [號碼]";
                      break;
                  case 'NIGHT_WITCH':
                      statusBar.innerText = "🌙 黑夜：女巫請睜眼";
                      actionInput.disabled = (myRole !== 'WITCH');
                      if (myRole === 'WITCH') actionInput.placeholder = "輸入 witch_action SAVE/POISON [號碼]";
                      break;
                  case 'DAY_ANNOUNCE':
                      statusBar.innerText = `房間：${state.roomId} | ☀️ 白天：昨晚結算`;
                      actionInput.disabled = true;
                      break;
                  case 'DAY_LAST_WORDS':
                      statusBar.innerText = `房間：${state.roomId} | 👻 遺言階段：等待 ${state.currentSpeaker} 號玩家發言`;
                      if (state.currentSpeaker !== mySeat) actionInput.disabled = true;
                      break;
                  case 'DAY_SPEECH':
                      statusBar.innerText = `房間：${state.roomId} | 🗣️ 白天：等待 ${state.currentSpeaker} 號玩家發言`;
                      if (state.currentSpeaker !== mySeat) actionInput.disabled = true;
                      break;
                  case 'DAY_VOTE':
                      statusBar.innerText = `房間：${state.roomId} | 🗳️ 白天：投票階段`;
                      actionInput.disabled = false;
                      actionInput.placeholder = "輸入 vote [號碼]";
                      break;
                  case 'GAMEOVER':
                      statusBar.innerText = `房間：${state.roomId} | 🏁 遊戲結束`;
                      actionInput.disabled = true;
                      break;
              }

              // 通用倒數計時處理
              if (state.phaseEndTime) {
                  const baseText = statusBar.innerText;
                  const updateTimer = () => {
                      const left = Math.max(0, Math.floor((state.phaseEndTime - Date.now()) / 1000));
                      statusBar.innerText = `${baseText} (${left}s)`;
                  };
                  countdownInterval = setInterval(updateTimer, 1000);
                  updateTimer();
              }
          }

          function addLog(text, className) {
              const entry = document.createElement('div');
              entry.className = `log-entry ${className}`;
              entry.innerText = text;
              gameLog.appendChild(entry);
              gameLog.scrollTop = gameLog.scrollHeight;
          }
      </script>
  </body>
  </html>
